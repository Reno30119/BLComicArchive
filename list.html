<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漫畫書庫 - 查詢系統</title>
    <link rel="stylesheet" href="list-style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>"
    />
  </head>
  <body>
    <nav class="top-nav">
      <a href="index.html" class="nav-item">➕ 新增書籍</a>
      <a href="list.html" class="nav-item active">🔍 查詢書庫</a>
      <a href="tags.html" class="nav-item">🏷️ 標籤管理</a>
    </nav>

    <div class="list-container">
      <header class="list-header">
        <div class="search-bar">
          <div
            style="
              position: relative;
              flex: 1;
              display: flex;
              align-items: center;
            "
          >
            <input
              type="text"
              id="searchInput"
              placeholder="搜尋書名、作者或標籤..."
              style="width: 100%; padding-right: 30px"
              autocomplete="off"
            />
            <span
              id="clearSearch"
              style="
                position: absolute;
                right: 20px;
                cursor: pointer;
                color: #ccc;
                display: none;
              "
              >✖</span
            >
            <div id="searchRecommendationList" class="custom-tag-list"></div>
          </div>
          <button id="refreshBtn" class="refresh-btn" onclick="fetchData()">
            🔄 更新數據
          </button>
        </div>
        <div class="sort-group">
          <div class="filter-item">
            <span class="filter-label">🛠️ 排序</span>
            <div class="btn-group">
              <button class="sort-btn" onclick="sortData('rating')">
                ⭐ 分數
              </button>
              <button class="sort-btn" onclick="sortData('author')">
                🖋️ 作者
              </button>
              <button class="sort-btn" onclick="sortData('title')">
                📜 書名
              </button>
              <button class="sort-btn" onclick="sortData('date')">
                📅 日期
              </button>
            </div>
          </div>

          <div class="filter-item">
            <span class="filter-label">🍙 分級</span>
            <div class="btn-group">
              <select
                id="levelFilter"
                class="filter-select"
                onchange="applyFilters()"
              >
                <option value="all">所有分級</option>
                <option value="肉多">🥩 肉多</option>
                <option value="正常">🍛 正常</option>
                <option value="肉少">🥗 肉少</option>
                <option value="清水">💧 清水</option>
              </select>
            </div>
          </div>

          <div class="filter-item">
            <span class="filter-label">💎 評分</span>
            <div class="btn-group">
              <select
                id="ratingFilter"
                class="filter-select"
                onchange="applyFilters()"
              >
                <option value="all">所有分數區間</option>
                <option value="8">8 分以上 (推薦)</option>
                <option value="6">6-7 分 (一般)</option>
                <option value="0">5 分以下 (避雷)</option>
              </select>
            </div>
          </div>

          <div class="filter-item reviewer-filter-item">
            <span class="filter-label">🎨 評論者</span>
            <div class="btn-group">
              <button class="filter-btn active" data-reviewer="all">
                全部
              </button>
              <button class="filter-btn" data-reviewer="Reno">Reno</button>
              <button class="filter-btn" data-reviewer="茶壺">茶壺</button>
            </div>
            <div
              class="reset-container"
              style="text-align: center; margin-top: 10px"
            >
              <button
                id="resetAllBtn"
                class="reset-btn"
                onclick="resetAllFilters()"
                style="
                  padding: 8px 18px;
                  background: #f1f3f5;
                  border: 1px solid #dee2e6;
                  border-radius: 8px;
                  cursor: pointer;
                  color: #666;
                  font-size: 0.9em;
                  transition: 0.2s;
                "
              >
                🧹 重置所有條件
              </button>
            </div>
          </div>
        </div>
      </header>

      <div id="loading">讀取書庫中...</div>
      <div class="book-grid" id="bookGrid"></div>
    </div>

    <div id="editModal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modalTitle">📝 編輯書籍資訊</h3>
        <form id="editForm">
          <input type="hidden" id="editTimestamp" name="timestamp" />
          <input type="hidden" id="oldTitle" name="oldTitle" />
          <input type="hidden" name="action" value="update" />

          <div id="infoFieldsGroup">
            <label>中文書名</label>
            <input type="text" id="editTitle" name="title" required />

            <label>日文書名</label>
            <input type="text" id="editJpTitle" name="jpTitle" />

            <label>作者</label>
            <input type="text" id="editAuthor" name="author" />
            <div style="display: flex; gap: 10px; margin-bottom: 15px">
              <div style="flex: 1">
                <label
                  style="display: block; font-size: 0.9em; margin-bottom: 5px"
                  >🇹🇼 台灣狀態</label
                >
                <input
                  type="text"
                  id="editTwStatus"
                  name="twStatus"
                  placeholder="台版進度"
                />
              </div>
              <div style="flex: 1">
                <label
                  style="display: block; font-size: 0.9em; margin-bottom: 5px"
                  >🇯🇵 日本狀態</label
                >
                <input
                  type="text"
                  id="editJpStatus"
                  name="jpStatus"
                  placeholder="日版進度"
                />
              </div>
            </div>
            <div style="display: flex; gap: 15px">
              <div style="flex: 1">
                <label>分級</label>
                <select id="editLevel" name="level">
                  <option value="肉多">🥩 肉多</option>
                  <option value="正常">🍛 正常</option>
                  <option value="肉少">🥗 肉少</option>
                  <option value="清水">💧 清水</option>
                </select>
              </div>
            </div>

            <label>標籤 (以逗號 / 空白鍵分隔)</label>
            <div style="position: relative">
              <input type="text" id="editTags" name="tags" autocomplete="off" />
              <div id="customTagList" class="custom-tag-list"></div>
            </div>

            <label>電子書網址</label>
            <input type="url" id="editEbookUrl" name="ebookUrl" />

            <label>ちるちる網址</label>
            <input type="url" id="editChilUrl" name="chilUrl" />
          </div>

          <div id="commentFieldsGroup">
            <label>評分 (1-10)</label>
            <input
              type="number"
              id="editRating"
              name="rating"
              step="0.5"
              min="1"
              max="10"
            />

            <label>我的評語</label>
            <textarea
              id="editComment"
              name="comment"
              rows="6"
              placeholder="分享你的讀後感..."
            ></textarea>
          </div>

          <div class="modal-btns">
            <button type="submit" class="save-btn">儲存修改</button>
            <button type="button" onclick="closeModal()" class="cancel-btn">
              取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="addCommentModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="addCommentModalTitle">✍️ 新增新評論</h3>
        </div>
        <form id="addCommentForm">
          <input type="hidden" id="addCommentTargetTitle" name="title" />
          <input type="hidden" id="addCommentJpTitle" name="jpTitle" />
          <input type="hidden" id="addCommentAuthor" name="author" />
          <input type="hidden" id="addCommentLevel" name="level" />
          <input type="hidden" id="addCommentTags" name="tags" />
          <input type="hidden" id="addCommentEbookUrl" name="ebookUrl" />
          <input type="hidden" id="addCommentChilUrl" name="chilUrl" />
          <input type="hidden" id="addCommentCoverUrl" name="coverUrl" />
          <input type="hidden" id="addCommentTwStatus" name="twStatus" />
          <input type="hidden" id="addCommentJpStatus" name="jpStatus" />

          <div class="form-group">
            <label>評論者</label>
            <div class="reviewer-options">
              <button
                type="button"
                class="rev-select-btn"
                onclick="setAddReviewer('Reno', this)"
              >
                Reno
              </button>
              <button
                type="button"
                class="rev-select-btn"
                onclick="setAddReviewer('茶壺', this)"
              >
                茶壺
              </button>
            </div>
            <input
              type="hidden"
              id="addCommentReviewer"
              name="reviewer"
              required
            />
          </div>

          <div class="form-group">
            <label for="addCommentRating">評分 (0.0 - 10.0)</label>
            <input
              type="number"
              id="addCommentRating"
              name="rating"
              min="0"
              max="10"
              step="0.5"
              value="5.0"
            />
          </div>

          <div class="form-group">
            <label for="addCommentContent">評語內容</label>
            <textarea
              id="addCommentContent"
              name="comment"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="modal-footer">
            <button
              type="submit"
              class="save-review-btn"
              id="addCommentSaveBtn"
            >
              確認送出
            </button>
            <button
              type="button"
              class="cancel-btn"
              onclick="closeAddCommentModal()"
            >
              取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      /**
       * ⚠️ 重要提示：
       * 每次修改 GAS 程式碼後，請點擊「部署」->「管理部署」->「編輯」->「版本：新版本」
       * 這樣才能確保 scriptURL 維持不變。
       */
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbwqnfCjBq_BYZSWAOU6TnVj2O6YvFF2jan4dY0smm3waf9xP-wOLmz2_4B_L3MND7PK9A/exec";

      let allBooks = [];

      window.addEventListener("DOMContentLoaded", fetchData);

      async function fetchData() {
        const loadingEl = document.getElementById("loading");
        try {
          if (loadingEl) {
            loadingEl.style.display = "block";
            loadingEl.innerHTML = "正在同步最新書庫...";
          }
          const response = await fetch(
            `${scriptURL}?action=read&t=${new Date().getTime()}`,
          );
          if (!response.ok) throw new Error("網路回應錯誤");

          allBooks = await response.json();

          if (allBooks && allBooks.length > 0) {
            // ⚠️ 關鍵修正：初始讀取改為呼叫 applyFilters，它會處理合併邏輯並呼叫 renderBooks
            applyFilters();
            if (loadingEl) loadingEl.style.display = "none";
          } else {
            if (loadingEl) loadingEl.innerHTML = "📭 目前書庫中沒有資料。";
          }
        } catch (error) {
          console.error("讀取失敗:", error);
          if (loadingEl)
            loadingEl.innerHTML =
              "❌ 讀取失敗，請確認 GAS 部署為「所有人」且網址正確";
        }
      }
      function openEditModal(ts) {
        // 找尋對應時間戳記的原始資料
        const book = allBooks.find((b) => String(b.timestamp) === String(ts));
        if (!book) return;

        // 將所有欄位填入表單，避免更新時漏掉資料
        document.getElementById("editTimestamp").value = book.timestamp || "";
        document.getElementById("editTitle").value = book.title || "";
        document.getElementById("editJpTitle").value = book.jpTitle || "";
        document.getElementById("editAuthor").value = book.author || "";
        document.getElementById("editLevel").value = book.level || "正常";
        document.getElementById("editRating").value = book.rating || 5;
        document.getElementById("editTags").value = book.tags || "";
        document.getElementById("editEbookUrl").value = book.ebookUrl || "";
        document.getElementById("editChilUrl").value = book.chilUrl || "";
        document.getElementById("editComment").value = book.comment || "";

        document.getElementById("editModal").classList.remove("hidden");
      }

      let currentReviewer = "all";

      // 2. 綁定按鈕點擊事件
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          // 切換按鈕樣式
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          this.classList.add("active");

          // 更新篩選狀態並重新渲染
          currentReviewer = this.getAttribute("data-reviewer");
          applyFilters();
        });
      });

      function renderBooks(data) {
        const grid = document.getElementById("bookGrid");
        if (!grid) return;
        grid.innerHTML = "";

        const validData = data.filter(
          (item) => item.title && String(item.title).trim() !== "",
        );

        data.forEach((book) => {
          const row = document.createElement("div");
          row.className = "book-list-item";
          const avgRating = parseFloat(book.avgRating || 0).toFixed(1);

          const coverUrl = book.coverUrl || "";
          const coverHTML =
            book.coverUrl && book.coverUrl !== ""
              ? `<img src="${book.coverUrl}" alt="封面">`
              : `<div class="no-cover">
       <span>無封面</span>
       <button onclick="reFetchCover('${book.title.replace(/'/g, "\\'")}', '${
         book.ebookUrl || ""
       }', '${book.chilUrl || ""}')">🔍 抓取</button>
     </div>`;

          row.innerHTML = `
            <div class="item-main" style="display: flex; gap: 15px; align-items: flex-start;">
                <div class="book-cover-side">
                    ${coverHTML}
                </div>

                <div class="item-info" style="flex: 1;">
                    <div class="title-row" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                        <span class="badge ${getLevelColor(book.level)}">${
                          book.level
                        }</span>
                        <h3 class="title" style="margin: 0; flex: 1;">${
                          book.title
                        }</h3>
                        <span class="avg-score ${getScoreColor(
                          avgRating,
                        )}">${avgRating}</span>
                        
<button class="edit-book-btn" onclick="openBookInfoModal('${
            book.reviews[0].timestamp
          }')" title="編輯書籍基本資訊" style="background:none; border:none; color:#3498db; cursor:pointer; font-size:16px; padding:0 5px;">⚙️</button>
                    </div>

                    

              <p class="author" style="margin: 8px 0; margin-top:-2px">
                  👤 <span class="author-link" onclick="quickSearch('${book.author.replace(
                    /'/g,
                    "\\'",
                  )}')">${book.author}</span> 
                  <span class="jp-title" style="color:#888;margin-left: 8px; font-size:0.85em;">${
                    book.jpTitle || ""
                  }</span>
                </p>
<div class="status-row" style="margin-top: 12px;display: flex; gap: 8px; margin-bottom: 4px; font-size: 0.82em;">
    <span style="background: #fff5f5; color: #c53030; padding: 2px 8px; border-radius: 4px; border: 1px solid #fed7d7;">
        🇹🇼 台：${book.twStatus || "-"}
    </span>
    <span style="background: #eef2f7; color: #5a67d8; padding: 2px 8px; border-radius: 4px; border: 1px solid #dee2e6;">
        🇯🇵 日：${book.jpStatus || "-"}
    </span>
</div>
              <div class="tags" style="margin-top: 8px; margin-bottom: 5px; display: flex; flex-wrap: wrap; gap: 2px;">
                  ${
                    book.tags
                      ? String(book.tags)
                          .split(",")
                          .map((t) => {
                            const tag = t.trim();
                            return `<span class="tag-badge" onclick="quickSearch('${tag.replace(
                              /'/g,
                              "\\'",
                            )}')">#${tag}</span>`;
                          })
                          .join("")
                      : ""
                  }
              </div>

                    <div class="item-links" style="margin-bottom: 10px;">
                        ${
                          book.ebookUrl
                            ? `<a href="${book.ebookUrl}" target="_blank" class="link-icon ebook">📖 Bookwalker</a>`
                            : ""
                        }
                        ${
                          book.chilUrl
                            ? `<a href="${book.chilUrl}" target="_blank" class="link-icon chil">🍒 ちるちる</a>`
                            : ""
                        }
                      <div class="add-review-action-area">
<button class="add-review-btn mobile-up-btn" onclick="openAddCommentModal('${
            book.reviews[0].timestamp
          }')">
  📝 新增評論
</button>
                        </div>
                            
                    </div>


                    <div class="item-reviews" style="border-top: 1px solid #f0f0f0; padding-top: 10px;">
                        ${book.reviews
                          .map(
                            (r) => `
                            <div class="mini-review" style="position: relative; padding-right: 35px; margin-bottom: 5px; background: #fdfdfd; padding: 8px; border-radius: 6px;">
                                <span class="rev-name" style="font-weight:bold;">${
                                  r.reviewer
                                }</span><span style="color: #ddd;margin-left: 8px;">||</span>
                                <span class="rev-score ${getScoreColor(
                                  r.rating,
                                )}"  style="margin-left:1px;">⭐${
                                  r.rating
                                }</span>
                                <span class="rev-comment" style="display:block; font-size:0.9em; color:#555;">${
                                  r.comment
                                }</span>
                                <button class="small-edit-btn" onclick="openCommentModal('${
                                  r.timestamp
                                }')" style="position:absolute; right:5px; top:8px; border:none; background:none; cursor:pointer; color:#ccc;">✎</button>
                            </div>
                        `,
                          )
                          .join("")}


                    </div>
                </div>
            </div>
        `;
          grid.appendChild(row);
        });
      }
      // 1. 抓取封面的補救功能
      async function reFetchCover(title, bwUrl, chilUrl) {
        // 優先順序：BookWalker > Chil-Chil
        // 檢查網址是否有效 (排除空字串或 "undefined" 字串)
        let urlToFetch =
          bwUrl && bwUrl !== "" && bwUrl !== "undefined" ? bwUrl : null;

        if (!urlToFetch) {
          urlToFetch =
            chilUrl && chilUrl !== "" && chilUrl !== "undefined"
              ? chilUrl
              : null;
        }

        if (!urlToFetch) {
          alert("❌ 缺少 BookWalker 或 Chil-Chil 網址，請先編輯書籍資訊。");
          return;
        }

        const btn = event.target;
        const coverContainer = btn.closest(".book-cover-side");
        const originalContent = coverContainer.innerHTML;
        coverContainer.innerHTML = "<span>⌛ 抓取中...</span>";

        try {
          const fetchUrl = `${scriptURL}?action=fetchCover&url=${encodeURIComponent(
            urlToFetch,
          )}`;
          const res = await fetch(fetchUrl);
          const data = await res.json();

          if (data.coverUrl) {
            coverContainer.innerHTML = `<img src="${data.coverUrl}" alt="封面">`;

            // 同步更新回試算表
            const formData = new FormData();
            formData.append("title", title);
            formData.append("coverUrl", data.coverUrl);
            formData.append("action", "updateCoverOnly");

            fetch(scriptURL, { method: "POST", body: formData });
            alert("✅ 封面抓取成功！");
          } else {
            coverContainer.innerHTML = originalContent;
            alert("❌ 抓取失敗：" + (data.error || "找不到圖片"));
          }
        } catch (e) {
          coverContainer.innerHTML = originalContent;
          console.error("抓取錯誤:", e);
          alert("❌ 連線錯誤，請檢查網路或 GAS 狀態。");
        }
      }

      // 1. 點擊齒輪：編輯基本資訊
      function openBookInfoModal(ts) {
        console.log("當前點擊的時間戳 TS:", ts); // 除錯點 1

        const book = allBooks.find((b) => String(b.timestamp) === String(ts));

        console.log("抓到的書本原始資料:", book); // 除錯點 2

        if (!book) {
          console.error("❌ 找不到資料！請檢查 allBooks 陣列中是否有這個 TS");
          return;
        }

        // --- 關鍵：恢復顯示所有基本欄位 ---
        document.getElementById("infoFieldsGroup").style.display = "block";
        document.getElementById("commentFieldsGroup").style.display = "none";

        // 恢復書名與其標籤的顯示
        const titleInput = document.getElementById("editTitle");
        const titleLabel = titleInput.previousElementSibling;
        titleInput.style.display = "block";
        if (titleLabel && titleLabel.tagName === "LABEL")
          titleLabel.style.display = "block";

        document.getElementById("modalTitle").innerText = "⚙️ 編輯書籍基本資訊";

        // 填充資料
        // 關鍵填充：確保所有格子在提交時都有原本的內容
        document.getElementById("oldTitle").value = book.title || "";
        document.getElementById("editTimestamp").value = book.timestamp || "";
        document.getElementById("editTitle").value = book.title || "";
        document.getElementById("editJpTitle").value = book.jpTitle || "";
        document.getElementById("editAuthor").value = book.author || "";
        document.getElementById("editLevel").value = book.level || "正常";
        document.getElementById("editTags").value = book.tags || "";
        // 💡 補上連載狀態的填充
        document.getElementById("editTwStatus").value = book.twStatus || "";
        document.getElementById("editJpStatus").value = book.jpStatus || "";

        document.getElementById("editEbookUrl").value = book.ebookUrl || "";
        document.getElementById("editChilUrl").value = book.chilUrl || "";

        // 即使在齒輪模式，也要填入分數和評語，防止 GAS 寫入空值
        document.getElementById("editRating").value = book.rating || 5;
        document.getElementById("editComment").value = book.comment || "";

        document.getElementById("editModal").classList.remove("hidden");
      }

      function openCommentModal(ts) {
        console.log("當前點擊的時間戳 TS:", ts); // 除錯點 1

        const row = allBooks.find((b) => String(b.timestamp) === String(ts));

        console.log("抓到的書本原始資料:", row); // 除錯點 2

        if (!row) {
          console.error("❌ 找不到資料！請檢查 allBooks 陣列中是否有這個 TS");
          return;
        }

        // 1. 切換 UI 顯示：隱藏基本資訊，顯示評語區
        document.getElementById("infoFieldsGroup").style.display = "none";
        document.getElementById("commentFieldsGroup").style.display = "block";

        // 2. 隱藏書名輸入框與標籤 (維持評語模式的簡潔)
        const titleInput = document.getElementById("editTitle");
        const titleLabel = titleInput.previousElementSibling;
        titleInput.style.display = "none";
        if (titleLabel && titleLabel.tagName === "LABEL") {
          titleLabel.style.display = "none";
        }

        document.getElementById("modalTitle").innerText = "✍️ 編輯我的評語";

      // 核心過濾邏輯：先合併所有評語，再執行搜尋、分數與評論者的篩選
      function applyFilters() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();

        const ratingThreshold = document.getElementById("ratingFilter").value;
        const levelThreshold = document.getElementById("levelFilter").value;

        // 1. 合併邏輯：按書名分組
        const validData = allBooks.filter(
          (item) => item.title && String(item.title).trim() !== "",
        );

        const merged = validData.reduce((acc, curr) => {
          const bookTitle = String(curr.title).trim();
          if (!acc[bookTitle]) {
            acc[bookTitle] = {
              ...curr,
              title: bookTitle,
              reviews: [],
              tags: curr.tags || "",
            };
          }
          acc[bookTitle].reviews.push({
            reviewer: curr.reviewer || "匿名",
            rating: parseFloat(curr.rating) || 0,
            comment: curr.comment || "",
            timestamp: curr.timestamp,
          });
          return acc;
        }, {});

        // 2. 計算平均分並排序評論者
        let processedBooks = Object.values(merged).map((book) => {
          const totalRating = book.reviews.reduce(
            (sum, r) => sum + r.rating,
            0,
          );
          book.avgRating = totalRating / book.reviews.length;
          book.reviews.sort((a, b) =>
            String(a.reviewer).localeCompare(String(b.reviewer), "zh-Hant"),
          );
          return book;
        });

        // 3. 執行過濾
        let filtered = processedBooks.filter((book) => {
          // --- 【搜尋邏輯修正開始】 ---
          const query = searchTerm.trim();
          let matchSearch = false;

          if (query === "") {
            matchSearch = true; // 沒輸入文字就顯示全部
          } else if (query.startsWith("#")) {
            // A 模式：標籤精確比對 (當點選推薦標籤產生的 # 格式時)
            const pureTag = query.substring(1); // 移除 # 字號
            const tagList = book.tags
              .toLowerCase()
              .split(/[ ,、]+/)
              .map((t) => t.trim())
              .filter((t) => t !== "");

            // 這裡使用 includes 做精確匹配，避免搜尋「青梅」也出現「青梅竹馬」
            matchSearch = tagList.includes(pureTag);
          } else {
            // B 模式：一般模糊比對 (手動輸入時)
            const matchTitle = book.title.toLowerCase().includes(query);
            const matchAuthor = (book.author || "")
              .toLowerCase()
              .includes(query);

            const tagList = book.tags
              .toLowerCase()
              .split(/[ ,、]+/)
              .map((t) => t.trim());

            // 這裡用 some + includes，讓手動輸入時依然保有彈性
            const matchTags = tagList.some((t) => t.includes(query));

            matchSearch = matchTitle || matchAuthor || matchTags;
          }
          // --- 【搜尋邏輯修正結束】 ---

          // B. 分數區間過濾
          let matchRating = true;
          const score = book.avgRating;
          if (ratingThreshold === "8") matchRating = score >= 8;
          else if (ratingThreshold === "6")
            matchRating = score >= 6 && score < 8;
          else if (ratingThreshold === "0") matchRating = score < 6;

          // C. 評論者篩選邏輯
          const matchReviewer =
            currentReviewer === "all" ||
            book.reviews.some((r) => r.reviewer === currentReviewer);

          // D. 分級過濾邏輯
          const matchLevel =
            levelThreshold === "all" || book.level === levelThreshold;

          return matchSearch && matchRating && matchReviewer && matchLevel;
        });

        // 4. 排序邏輯
        filtered.sort((a, b) => {
          if (currentSortType === "rating") return b.avgRating - a.avgRating;
          if (currentSortType === "author")
            return String(a.author).localeCompare(String(b.author), "zh-Hant");
          if (currentSortType === "title")
            return String(a.title).localeCompare(String(b.title), "zh-Hant");
          if (currentSortType === "date")
            return new Date(b.timestamp) - new Date(a.timestamp);
          return 0;
        });

        renderBooks(filtered);
      }

      const sInput = document.getElementById("searchInput");
      const cBtn = document.getElementById("clearSearch");

      sInput.addEventListener("input", () => {
        cBtn.style.display = sInput.value ? "block" : "inline";
        if (!sInput.value) cBtn.style.display = "none";
        applyFilters();
      });

      cBtn.addEventListener("click", () => {

      editTags.addEventListener("input", function (e) {

      let allDefinedTags = []; // 用來存儲從 Tags 分頁抓來的資料

      // 1. 初始化抓取標籤定義 (可以在 fetchData 內或 window.onload 執行)
      async function fetchTagDefinitions() {
        try {
          const res = await fetch(`${scriptURL}?action=readTags`);
          allDefinedTags = await res.json();
        } catch (e) {
          console.error("載入標籤定義失敗", e);

      // 2. 監聽編輯框的輸入
      const editTagInput = document.getElementById("editTags");

      editTagInput.addEventListener("input", function () {
        const fullVal = this.value;
        // 支援空白、逗號、頓號分割
        const parts = fullVal.split(/[ ,、]+/);
        const currentQuery = parts[parts.length - 1].trim().toLowerCase();

        if (currentQuery === "") {
          customList.style.display = "none";
          return;
        }

        const matches = allDefinedTags.filter((t) =>
          t.name.toLowerCase().includes(currentQuery),
        );

        if (matches.length > 0) {
          customList.innerHTML = matches
            .map(
              (t) => `
      <div class="tag-item" onclick="applyTagToEdit('${t.name}')">
        <strong>${t.name}</strong>
        <span class="tag-desc">${t.definition || ""}</span>
      </div>
    `,
            )
            .join("");
          customList.style.display = "block";
        } else {
          customList.style.display = "none";
        }

        // 統一格式為「標籤, 標籤」

          parts
            .map((p) => p.trim())
            .filter((p) => p !== "")
            .join(", ") + ", ";

        customList.style.display = "none";
        editTagInput.focus();
      };

                  text: t.trim(),
                  sub: "【標籤】",
                  icon: "🏷️",
                  type: "tag",
                });
              }
            });
          }
        });

        // 去重
        const uniqueMatches = Array.from(
          new Map(suggestions.map((s) => [s.text, s])).values(),
        ).slice(0, 10);

        if (uniqueMatches.length > 0) {
          searchRecList.innerHTML = uniqueMatches
            .map(
              (item) => `
      <div class="tag-item" onclick="selectSearchRec('${item.text.replace(/'/g, "\\'")}', '${item.type}')">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span>${item.icon} ${item.text}</span>
          <span class="rec-author">${item.sub}</span>
        </div>
      </div>
    `,
            )
            .join("");
          searchRecList.style.display = "block";
        } else {
          searchRecList.style.display = "none";
        }
      });

      window.selectSearchRec = function (text, type) {
        const searchInput = document.getElementById("searchInput");
        const searchRecList = document.getElementById(
          "searchRecommendationList",
        );
        const clearBtn = document.getElementById("clearSearch");

        // 如果類型是 tag，自動在前面加個 # 符號，變成標籤專用搜尋模式
        if (type === "tag") {
          searchInput.value = "#" + text;
        } else {
          searchInput.value = text;
        }

        if (clearBtn) clearBtn.style.display = "block";
        if (searchRecList) searchRecList.style.display = "none";

        // 執行你原本的過濾邏輯
        if (typeof applyFilters === "function") {
          applyFilters();
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      // 點擊空白處關閉
      document.addEventListener("click", (e) => {
        if (e.target !== searchInput) searchRecList.style.display = "none";
      });
    </script>
  </body>
</html>
