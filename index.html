<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漫畫書庫 - 建立書本</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2215%22 y=%2220%22 width=%2220%22 height=%2260%22 fill=%22%23e74c3c%22 rx=%222%22/><rect x=%2240%22 y=%2210%22 width=%2220%22 height=%2270%22 fill=%22%233498db%22 rx=%222%22/><rect x=%2265%22 y=%2225%22 width=%2220%22 height=%2255%22 fill=%22%23f1c40f%22 rx=%222%22/></svg>"
    />
  </head>
  <body>
    <nav class="top-nav">
      <a href="index.html" class="nav-item active">➕ 新增書籍</a>
      <a href="list.html" class="nav-item">🔍 查詢書庫</a>
      <a href="tags.html" class="nav-item">🏷️ 標籤管理</a>
    </nav>

    <div class="container">
      <header class="form-header">
        <h2>📚 新增漫畫書籍</h2>
        <div class="db-status-bar">
          <div id="dbCountBadge" class="status-badge">♻️ 書庫連線中...</div>
          <div id="dbTimeBadge" class="status-badge">🕒 --:--</div>
        </div>
      </header>

      <form id="bookForm">
        <div class="form-group">
          <label for="title">中文書名</label>
          <div style="position: relative; width: 100%">
            <input
              type="text"
              id="title"
              name="title"
              required
              placeholder="請輸入書名"
              autocomplete="off"
              style="width: 100%; box-sizing: border-box"
            />
            <div class="title-system-root" style="position: relative" ;>
              <div id="titleRecommendationList" class="custom-tag-list"></div>
            </div>
          </div>
          <div id="searchFeedback" class="search-feedback"></div>
        </div>
        <div class="form-group">
          <label for="jpTitle">日文書名</label>
          <input type="text" id="jpTitle" name="jpTitle" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" required />
          </div>
          <div class="form-group">
            <label for="level">分級</label>
            <select id="level" name="level">
              <option value="肉多">🥩 肉多</option>
              <option value="正常" selected>🍛 正常</option>
              <option value="肉少">🥗 肉少</option>
              <option value="清水">💧 清水</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="twStatus">🇹🇼 台灣連載狀態</label>
            <input type="text" id="twStatus" name="twStatus" />
          </div>
          <div class="form-group">
            <label for="jpStatus">🇯🇵 日本連載狀態</label>
            <input type="text" id="jpStatus" name="jpStatus" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>評論者</label>
            <div class="reviewer-buttons">
              <button type="button" class="rev-btn" data-name="Reno">
                Reno
              </button>
              <button type="button" class="rev-btn" data-name="茶壺">
                茶壺
              </button>
            </div>
            <input
              type="hidden"
              id="reviewer"
              name="reviewer"
              value=""
              required
            />
          </div>
          <div class="form-group">
            <label for="rating">評分 (1-10)</label>
            <div style="position: relative">
              <input
                type="number"
                id="rating"
                name="rating"
                min="1"
                max="10"
                step="0.5"
                value="5.0"
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="tags">標籤 (以逗號 / 空白鍵分隔)</label>
          <input
            type="text"
            id="tags"
            name="tags"
            placeholder="輸入關鍵字或點選標籤..."
            autocomplete="off"
          />

          <div class="tag-system-root" style="position: relative">
            <div id="customTagList" class="custom-tag-list"></div>

            <div class="tag-cloud-wrapper">
              <div id="tagCloud" class="tag-cloud"></div>
              <button
                type="button"
                id="toggleCloudBtn"
                class="toggle-cloud-btn"
              >
                展開標籤列表 ▼
              </button>
            </div>
          </div>
        </div>

        <input type="hidden" id="coverUrl" name="coverUrl" value="" />
        <div class="form-row">
          <div class="form-group">
            <label for="ebookUrl">電子書網站</label>
            <input type="url" id="ebookUrl" name="ebookUrl" />
          </div>
          <div class="form-group">
            <label for="chilUrl">ちるちる</label>
            <input type="url" id="chilUrl" name="chilUrl" />
          </div>
        </div>

        <div class="form-group">
          <label for="comment">評語內容</label>
          <textarea id="comment" name="comment" rows="3"></textarea>
        </div>

        <div class="form-actions-row">
          <button type="submit" id="submitBtn">確認送出資料</button>
          <button
            type="button"
            class="icon-clear-btn"
            onclick="clearFullForm()"
            title="清空資料"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </form>

      <div id="message" class="hidden"></div>
    </div>

    <script>
      // 取得評分輸入框
      const ratingInput = document.getElementById("rating");

      // 1. 先定義所有需要的變數
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbwqnfCjBq_BYZSWAOU6TnVj2O6YvFF2jan4dY0smm3waf9xP-wOLmz2_4B_L3MND7PK9A/exec";
      let allBooks = []; // 用來存放抓取回來的資料

      // 統一的同步函式：負責抓資料、更新記憶體 (allBooks)、更新美化狀態欄
      async function fetchAndRefreshStatus() {
        const dbCountBadge = document.getElementById("dbCountBadge");
        const dbTimeBadge = document.getElementById("dbTimeBadge");

        try {
          // 1. 抓取資料庫
          const response = await fetch(scriptURL + "?action=read");
          allBooks = await response.json();

          // 2. 計算「不重複書籍」數量 (使用你寫好的異體字標準化邏輯)
          const uniqueTitles = new Set(
            allBooks.map((book) => normalizeText(String(book.title || ""))),
          );

          // 3. 取得目前時間
          const now = new Date();
          const timeStr = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}`;

          // 4. 更新畫面上的美化標籤
          if (dbCountBadge) {
            dbCountBadge.innerHTML = `📖 書籍：${uniqueTitles.size} 本 (共 ${allBooks.length} 筆評論)`;
          }
          if (dbTimeBadge) {
            dbTimeBadge.innerHTML = `🕒 更新：${timeStr}`;
          }

          console.log(`同步完成：目前有 ${uniqueTitles.size} 本漫畫。`);
        } catch (error) {
          if (dbCountBadge) dbCountBadge.innerHTML = "❌ 連線失敗";
          console.error("資料讀取失敗:", error);
        }
      }

      fetchAndRefreshStatus();

      // 定義顏色切換函數
      function updateRatingColor(value) {
        const val = parseFloat(value);

        // 先移除所有顏色類別
        ratingInput.classList.remove("rating-low", "rating-mid", "rating-high");

        if (val < 5) {
          ratingInput.classList.add("rating-low");
        } else if (val >= 5 && val <= 7) {
          ratingInput.classList.add("rating-mid");
        } else if (val > 7) {
          ratingInput.classList.add("rating-high");
        }
      }

      // 1. 定義通用的自動抓取函式
      async function autoFetchCover() {
        const bwUrl = document.getElementById("ebookUrl").value.trim();
        const chilUrl = document.getElementById("chilUrl").value.trim();
        const msg = document.getElementById("message");
        const coverInput = document.getElementById("coverUrl"); // 確保上面有加隱藏欄位

        const targetUrl = bwUrl || chilUrl;
        if (!targetUrl) return;

        // 如果找不到 coverUrl 欄位，在控制台提醒但不要崩潰
        if (!coverInput) {
          console.warn("找不到 id='coverUrl' 的隱藏欄位，封面網址將無法存入。");
        }

        try {
          const res = await fetch(
            `${scriptURL}?action=fetchCover&url=${encodeURIComponent(
              targetUrl,
            )}`,
          );
          const data = await res.json();

          if (data.coverUrl) {
            if (coverInput) coverInput.value = data.coverUrl;
            msg.innerHTML = "✅ 封面自動預抓成功！";
            msg.className = "success show";
            msg.classList.remove("hidden");
            setTimeout(() => msg.classList.add("hidden"), 2000);
          }
        } catch (err) {
          console.error("抓取失敗", err);
        }
      }

      // 2. 同時綁定監聽器給兩個輸入框
      // 不論哪一個填完離開游標（blur），都會觸發抓取
      ["change"].forEach((evt) => {
        document
          .getElementById("ebookUrl")
          .addEventListener(evt, autoFetchCover);
        document
          .getElementById("chilUrl")
          .addEventListener(evt, autoFetchCover);
      });
      // 監聽輸入事件 (打字或按上下鈕都會觸發)
      ratingInput.addEventListener("input", (e) => {
        updateRatingColor(e.target.value);
      });

      const tagsInput = document.getElementById("tags");

      tagsInput.addEventListener("input", function (e) {
        let val = this.value;

        // 將「空白」或「全形頓號」即時替換為半形逗號
        if (val.includes(" ") || val.includes("、")) {
          this.value = val.replace(/[ 、]+/g, ",");
        }

        // 防止出現連續逗號
        this.value = this.value.replace(/,+/g, ",");
      });

      updateRatingColor(ratingInput.value);

      const form = document.getElementById("bookForm");
      const btn = document.getElementById("submitBtn");
      const msg = document.getElementById("message");

      const revButtons = document.querySelectorAll(".rev-btn");
      const reviewerInput = document.getElementById("reviewer");

      revButtons.forEach((button) => {
        button.addEventListener("click", () => {
          revButtons.forEach((b) => b.classList.remove("active"));
          button.classList.add("active");
          reviewerInput.value = button.getAttribute("data-name");
        });
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!reviewerInput.value) {
          alert("請選擇一位評論者！");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = "正在抓取封面並寫入...";
        msg.className = "info show";
        msg.classList.remove("hidden");

        // 1. 先抓取並整理標籤（去除多餘空格、重複、及結尾逗號）
        const tagsInputField = document.getElementById("tags");
        const cleanTags = tagsInputField.value
          .trim()
          .replace(/[ ,、]+$/, "")
          .split(/[ ,、]+/)
          .map((t) => t.trim())
          .filter((t) => t !== "")
          .join(", ");

        tagsInputField.value = cleanTags;
        // 4. 準備傳送資料
        const formData = new FormData(form);
        formData.set("tags", cleanTags); // 強制覆蓋，確保標籤雲點選的也有進來

        // 5. 如果你後面需要用到 data 物件
        const data = Object.fromEntries(formData.entries());

        try {
          // 1. 自動抓取封面邏輯：優先用 ebookUrl (BookWalker)，沒有就用 chilUrl (ちるちる)
          const targetUrl = data.ebookUrl || data.chilUrl;

          // 如果目前隱藏欄位還沒有封面網址，且有任何一個網址存在，就執行抓取
          if (!data.coverUrl && targetUrl) {
            try {
              const coverRes = await fetch(
                `${scriptURL}?action=fetchCover&url=${encodeURIComponent(
                  targetUrl,
                )}`,
              );
              const coverJson = await coverRes.json();

              if (coverJson.coverUrl) {
                // 重要：將抓到的網址「寫入」要送出的 formData 中
                formData.set("coverUrl", coverJson.coverUrl);
              }
            } catch (err) {
              console.error("封面自動抓取失敗，將僅上傳現有資料", err);
            }
          }

          // 2. 傳送資料到 GAS
          await fetch(scriptURL, {
            method: "POST",
            body: formData,
            mode: "no-cors", // 由於 Google Apps Script 的特性，必須使用 no-cors
          });

          // --- 在 form submit 的成功處理區段 ---
          // 3. 成功後的處理
          msg.innerHTML = "✅ 資料已成功同步！";

          // 修正：確保移除所有可能阻擋顯示的類別
          msg.classList.remove("hidden");
          msg.style.display = "block"; // 強制讓元素佔據空間

          // 確保套用正確的樣式
          msg.className = "success show";

          form.reset();
          fetchAndRefreshStatus(); // 更新 📖 狀態欄
          resetSearchFeedback(); // 清除「已有此書」提示
          updateRatingColor(5.0);
          revButtons.forEach((b) => b.classList.remove("active"));
          reviewerInput.value = "";
          btn.disabled = false;
          btn.innerHTML = "確認送出資料";

          window.scrollTo({ top: 0, behavior: "smooth" }); // 捲回頂部看提示

          // 3秒後自動隱藏
          setTimeout(() => {
            msg.classList.remove("show");
            msg.classList.add("hidden");
            msg.style.display = "none"; // 徹底隱藏避免佔位
          }, 3000);
        } catch (error) {
          console.error("傳送失敗:", error);
          msg.innerHTML = "❌ 傳送失敗，請檢查網路。";
          msg.className = "error show";
          btn.disabled = false;
          btn.innerHTML = "再試一次";
        }
      });

      // 1. 確保異體字對照表存在
      const variantMap = {
        秘: "祕",
        台: "臺",
        里: "裡",
        搜: "蒐",
        呪: "咒",
        迴: "回",
        猫: "貓",
        峰: "峯",
        嶋: "島",
      };

      // 2. 標準化文字函式
      function normalizeText(str) {
        if (!str) return "";
        let normalized = str.trim().toLowerCase();
        for (let key in variantMap) {
          normalized = normalized.split(key).join(variantMap[key]);
        }
        return normalized;
      }

      // 監聽書名輸入
      const titleInput = document.getElementById("title");
      const feedback = document.getElementById("searchFeedback");
      let lastAlertedTitle = ""; // 避免針對同一個書名重複跳出 confirm
      const titleRecList = document.getElementById("titleRecommendationList");
      let searchTimeout; // 1. 用來存放計時器的變數

      titleInput.addEventListener("input", function () {
        const inputVal = this.value.trim();
        clearTimeout(searchTimeout);

        if (!inputVal) {
          feedback.innerHTML = "";
          feedback.className = "search-feedback";
          titleRecList.style.display = "none";
          lastAlertedTitle = "";
          return;
        }

        // 3. 顯示搜尋中
        feedback.innerHTML = "🔍 正在搜尋書庫...";
        feedback.className = "search-feedback active status-searching";

        const normalizedInput = normalizeText(inputVal);

        // --- A. 下拉推薦邏輯 (模糊搜尋) ---
        // 找出書名包含關鍵字的所有書籍（不重複書名）
        const matches = [...new Set(allBooks.map((b) => b.title))]
          .filter((t) => normalizeText(t).includes(normalizedInput))
          .slice(0, 5); // 只顯示前 5 筆

        // 在你的 titleInput 監聽器內加入
        if (matches.length > 0) {
          titleRecList.innerHTML = matches
            .map((t) => {
              const book = allBooks.find((b) => b.title === t);
              return `
      <div class="tag-item" onclick="selectTitleFromRec('${t.replace(/'/g, "\\'")}')">
        <div style="display:flex; justify-content:space-between;">
          <strong>${t}</strong>
          <span style="color:#a5b1c2; font-size:0.85rem;">${book.author || ""}</span>
        </div>
      </div>`;
            })
            .join("");
          titleRecList.style.display = "block"; // 顯示
        } else {
          titleRecList.style.display = "none"; // 沒資料就隱藏
        }

        // --- B. 重複檢查邏輯 (完全符合) ---
        const existingBook = allBooks.find(
          (b) => normalizeText(String(b.title)) === normalizedInput,
        );

        if (existingBook) {
          feedback.innerHTML = "⚠️ 書庫內已有此書";
          feedback.className = "search-feedback active status-found";

          // 4. 保留你要求的邏輯，但包在定時器內並確保只會執行最後一次輸入的判定
          if (lastAlertedTitle !== normalizedInput) {
            searchTimeout = setTimeout(() => {
              if (
                confirm(
                  `📢 發現重複書籍！\n「${existingBook.title}」已存在。\n是否要自動填入書籍資料？`,
                )
              ) {
                autoFillForm(existingBook);
              }
              lastAlertedTitle = normalizedInput;
            }, 400); // 保留你要求的 400 毫秒延遲
          }
        } else {
          feedback.innerHTML = "✨ 書庫內尚未有此書";
          feedback.className = "search-feedback active status-new";
          lastAlertedTitle = "";
        }
      });

      // 新增：處理點選推薦項目的函式
      window.selectTitleFromRec = function (title) {
        titleInput.value = title;
        titleRecList.style.display = "none";

        // 找出該書的完整資料並帶入
        const fullBook = allBooks.find((b) => b.title === title);
        if (fullBook) {
          autoFillForm(fullBook);
        }
      };

      // 點擊頁面其他地方時關閉清單
      document.addEventListener("click", (e) => {
        if (e.target !== titleInput) titleRecList.style.display = "none";
      });

      // 封裝自動填入邏輯
      function autoFillForm(book) {
        const titleField = document.getElementById("title");
        resetSearchFeedback();

        // 1. 強制填入中文書名
        titleField.value = book.title || "";

        // 2. 重要：立刻更新「最後警告過的書名」，防止 input 事件再次觸發導致判定重疊
        lastAlertedTitle = normalizeText(book.title);

        document.getElementById("jpTitle").value = book.jpTitle || "";
        document.getElementById("author").value = book.author || "";
        document.getElementById("level").value = book.level || "正常";
        document.getElementById("twStatus").value = book.twStatus || "";
        document.getElementById("jpStatus").value = book.jpStatus || "";
        document.getElementById("ebookUrl").value = book.ebookUrl || "";
        document.getElementById("chilUrl").value = book.chilUrl || "";
        document.getElementById("tags").value = book.tags || "";

        if (book.coverUrl) {
          document.getElementById("coverUrl").value = book.coverUrl;
        }
        alert("✅ 資料已成功帶入。");
      }

      function resetSearchFeedback() {
        const feedback = document.getElementById("searchFeedback");
        if (feedback) {
          feedback.innerHTML = "";
          feedback.className = "search-feedback"; // 移除 active 類別使其隱藏
        }
        lastAlertedTitle = "";
      }

      function clearFullForm() {
        if (confirm("確定要清空目前填寫的所有資料嗎？")) {
          // 修正這裡：你的 form ID 是 bookForm
          const form = document.getElementById("bookForm");

          form.reset();

          // 額外重置隱藏欄位與按鈕狀態
          document.getElementById("coverUrl").value = "";
          document.getElementById("reviewer").value = "";

          // 移除評論者按鈕的選中狀態
          document
            .querySelectorAll(".rev-btn")
            .forEach((b) => b.classList.remove("active"));

          form.reset();
          // 回復預設評分顏色
          updateRatingColor(5.0);

          console.log("表單已完全清空");
        }
      }

      // 新增：專門用來隱藏搜尋回饋與重設狀態的函式
      function resetSearchFeedback() {
        const feedback = document.getElementById("searchFeedback");
        if (feedback) {
          feedback.innerHTML = "";
          feedback.className = "search-feedback"; // 移除 active 類別使其隱藏
        }
        lastAlertedTitle = ""; // 清除最後比對紀錄，讓下次輸入同書名時能再次觸發提示
      }

      let allTags = []; // 儲存從 GAS 抓回來的標籤

      // 定義分類標籤雲
      const categorizedTags = {
        作品性質: ["有續作", "續作", "系列作"],
        角色身分: [
          "DK",
          "大學生",
          "校園戀愛",
          "職場",
          "床伴",
          "隱藏面貌",
          "年齡差",
          "年下攻",
        ],
        故事特質: ["暗戀", "雙向暗戀", "歡喜冤家", "重逢", "同居"],
      };

      async function initTagFeatures() {
        try {
          const res = await fetch(`${scriptURL}?action=readTags`);
          allTags = await res.json();

          // 渲染標籤雲：現在改用 manualCloudTags
          renderTagCloud();
        } catch (e) {
          console.error("載入標籤失敗", e);
          // 即使 GAS 失敗，標籤雲還是可以渲染自訂標籤
          renderTagCloud();
        }
      }

      // 渲染分類標籤雲
      function renderTagCloud() {
        const cloud = document.getElementById("tagCloud");
        if (!cloud) return;

        const categoryColors = {
          作品性質: "#74b9ff", // 藍色
          角色身分: "#ff85a2", // 橘色
          故事特質: "#a29bfe", // 綠色
        };

        let html = "";
        for (const [category, tags] of Object.entries(categorizedTags)) {
          const color = categoryColors[category] || "#95a5a6"; // 若沒對應到則用灰色

          html += `
      <div class="tag-group">
        <div class="tag-group-title" style="border-left-color: ${color}">${category}</div>
        <div class="tag-group-items">
          ${tags
            .map(
              (tagName) => `
            <span class="cloud-item" 
                  style="border-left: 4px solid ${color} !important; background-color: ${color}15;" 
                  onclick="addTagFromUI('${tagName}')">
              + ${tagName}
            </span>
          `,
            )
            .join("")}
        </div>
      </div>
    `;
        }
        cloud.innerHTML = html;

        // 摺疊按鈕邏輯 (維持原本的 JS)
        const toggleBtn = document.getElementById("toggleCloudBtn");
        toggleBtn.onclick = function () {
          const isExpanded = cloud.classList.toggle("expanded");
          this.innerText = isExpanded ? "收起標籤列表 ▲" : "展開標籤列表 ▼";
        };
      }

      const tagInput = document.getElementById("tags");
      const customList = document.getElementById("customTagList");

      tagInput.addEventListener("input", function () {
        const fullVal = this.value;
        const parts = fullVal.split(/[ ,、]+/); // 分割現有標籤
        const currentQuery = parts[parts.length - 1].trim().toLowerCase();

        if (currentQuery === "") {
          customList.style.display = "none";
          return;
        }

        const matches = allTags.filter((t) =>
          t.name.toLowerCase().includes(currentQuery),
        );

        if (matches.length > 0) {
          customList.innerHTML = matches
            .map(
              (t) => `
      <div class="tag-item" onclick="addTagFromUI('${t.name}')">
        <strong>${t.name}</strong>
        <span class="tag-desc">${t.definition || ""}</span>
      </div>
    `,
            )
            .join("");
          customList.style.display = "block";
        } else {
          customList.style.display = "none";
        }
      });

      window.addTagFromUI = function (tagName) {
        const tagInput = document.getElementById("tags");
        let parts = tagInput.value.split(/[ ,、]+/);

        const existingTags = parts.map((p) => p.trim());
        if (!existingTags.includes(tagName)) {
          parts[parts.length - 1] = tagName;
          tagInput.value = parts.filter((p) => p !== "").join(", ") + ", ";
        }

        // 關鍵：選完標籤後隱藏推薦清單，讓標籤雲重新露出來
        document.getElementById("customTagList").style.display = "none";
        tagInput.focus();
      };

      // 點擊外部關閉搜尋推薦
      document.addEventListener("click", (e) => {
        if (e.target !== tagInput) customList.style.display = "none";
      });

      // 修正後的 addTagFromUI (點擊後自動收起搜尋清單)
      window.addTagFromUI = function (tagName) {
        const tagInput = document.getElementById("tags");
        let parts = tagInput.value.split(/[ ,、]+/);

        const existingTags = parts.map((p) => p.trim());
        if (!existingTags.includes(tagName)) {
          parts[parts.length - 1] = tagName;
          tagInput.value = parts.filter((p) => p !== "").join(", ") + ", ";
        }

        document.getElementById("customTagList").style.display = "none"; // 點選後立刻蓋掉推薦
        tagInput.focus();
      };

      window.addEventListener("load", initTagFeatures);
    </script>
  </body>
</html>
